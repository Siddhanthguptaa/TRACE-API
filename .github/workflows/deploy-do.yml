name: Deploy to DigitalOcean App Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy or update app
        id: deploy
        run: |
          echo "Listing all apps:"
          doctl apps list --format ID,Name,Spec.Name --no-header
          
          # Try to find existing app by spec name
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "trace-api" | head -1 | awk '{print $1}')
          
          echo "Found APP_ID: '$APP_ID'"
          
          if [ -z "$APP_ID" ]; then
            echo "Creating new app..."
            doctl apps create --spec .do/app.yaml
          else
            echo "Updating existing app (ID: $APP_ID)..."
            doctl apps update "$APP_ID" --spec .do/app.yaml
          fi
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Wait for deployment
        if: always()
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "trace-api" | head -1 | awk '{print $1}')
          
          if [ -n "$APP_ID" ]; then
            echo "Waiting for deployment to complete..."
            doctl apps get-deployment "$APP_ID" --wait
          fi
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}