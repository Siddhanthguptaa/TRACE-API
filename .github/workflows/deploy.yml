name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: trace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        
    - name: Run Alembic migrations
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/trace_test
        SUPABASE_URL: https://mock.supabase.co
        SUPABASE_KEY: mock_key
        SUPABASE_JWT_SECRET: test_secret_key_1234567890_abcdefghij
        RAZORPAY_KEY_ID: mock_key
        RAZORPAY_KEY_SECRET: mock_secret
        RAZORPAY_WEBHOOK_SECRET: mock_webhook_secret
        CELERY_BROKER_URL: redis://localhost:6379/0
        REDIS_URL: redis://localhost:6379/1
      run: |
        alembic upgrade head

    - name: Run backend tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/trace_test
        SUPABASE_URL: https://mock.supabase.co
        SUPABASE_KEY: mock_key
        SUPABASE_JWT_SECRET: test_secret_key_1234567890_abcdefghij
        RAZORPAY_KEY_ID: mock_key
        RAZORPAY_KEY_SECRET: mock_secret
        RAZORPAY_WEBHOOK_SECRET: mock_webhook_secret
        CELERY_BROKER_URL: redis://localhost:6379/0
        REDIS_URL: redis://localhost:6379/1
      run: |
        pytest tests/ --cov=api --cov-report=xml --cov-report=term-missing
        
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run Security Audit
      run: npm audit --audit-level=high

  build-docker:
    needs: [test, lint-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t trace-api:${{ github.sha }} .
        docker build -t trace-api:latest .

    # Add your registry push step here:
    # - name: Push to registry
    #   run: |
    #     docker tag trace-api:latest ${{ secrets.REGISTRY_URL }}/trace-api:latest
    #     docker push ${{ secrets.REGISTRY_URL }}/trace-api:latest
