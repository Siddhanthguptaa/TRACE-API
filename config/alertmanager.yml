global:
  resolve_timeout: 5m
  # Configure SMTP for email notifications
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alerts@trace.ai'
  # smtp_auth_username: 'alerts@trace.ai'
  # smtp_auth_password: ''

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Slack webhook — replace with your actual Slack incoming webhook URL
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK'
        channel: '#trace-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true

  - name: 'critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK'
        channel: '#trace-critical'
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true
    # PagerDuty — uncomment and add your service key
    # pagerduty_configs:
    #   - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
