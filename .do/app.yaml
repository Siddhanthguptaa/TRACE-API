# DigitalOcean App Platform Spec
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: trace-api
region: blr  # Bangalore (closest to India)

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: NikunjKaushik20/TRACE-API
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xs  # $10/mo — 1GB RAM, 1 vCPU
    http_port: 8000
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
    routes:
      - path: /api
        preserve_path_prefix: false
    envs:
      - key: WORKERS
        value: "1"
      - key: DATABASE_URL
        type: SECRET
      - key: SUPABASE_URL
        type: SECRET
      - key: SUPABASE_KEY
        type: SECRET
      - key: SUPABASE_JWT_SECRET
        type: SECRET
      - key: RAZORPAY_KEY_ID
        type: SECRET
      - key: RAZORPAY_KEY_SECRET
        type: SECRET
      - key: RAZORPAY_WEBHOOK_SECRET
        type: SECRET
      - key: CELERY_BROKER_URL
        type: SECRET
      - key: REDIS_URL
        type: SECRET
      - key: CORS_ORIGINS
        value: "*"

  - name: web
    source_dir: web
    github:
      repo: NikunjKaushik20/TRACE-API
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/mo — 512MB RAM
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 15
      period_seconds: 30
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: "${api.PUBLIC_URL}"
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: "https://uvdtorvdcphslzgraktm.supabase.co"
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2ZHRvcnZkY3Boc2x6Z3Jha3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxODM2NTQsImV4cCI6MjA5ODc1OTY1NH0.goMubVZCj6dpvF1GLagXbXkEhlOu5C58Q4JcAS0siVc"
      - key: NEXT_PUBLIC_SITE_URL
        value: "${web.PUBLIC_URL}"
